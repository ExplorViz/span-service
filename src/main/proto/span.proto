syntax = "proto3";

option java_multiple_files = true;
option java_package = "net.explorviz.span.proto";
option java_outer_classname = "SpanProto";

import "google/protobuf/empty.proto";

service SpanDataService {
  rpc PersistSpan (SpanData) returns (google.protobuf.Empty) {}
}

message SpanData {
  string span_id = 1;
  string parent_id = 2;
  string trace_id = 3;
  string landscape_token_id = 4;
  int64 start_time = 5;
  int64 end_time = 6;
  string application_name = 7;
  string file_path = 8; // Relative to application root, includes file extension, separated with "/"
  string function_name = 9; // Unqualified, contains just the name
  optional string class_name = 10; // Inner classes are qualified against parent, separated with "."
  optional string commit_hash = 11;
}
